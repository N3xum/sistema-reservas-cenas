{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card card-elegant p-4">
            <h3 class="text-center mb-4">Añadir Nueva Experiencia</h3>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label>Nombre del Menú / Experiencia</label>
                    <input type="text" name="nombre_experiencia" class="form-control" required placeholder="Ej. Cena Rústica 3 Tiempos">
                </div>
                <div class="mb-3">
                    <label>Descripción detallada</label>
                    <textarea name="descripcion" class="form-control" rows="4" placeholder="Detalla los platillos, entradas y postres..."></textarea>
                </div>
                <div class="mb-3">
                    <label>Precio (Bs.)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" required>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" name="disponibilidad" id="disponibilidad" checked>
                    <label class="form-check-label" for="disponibilidad">
                        Activar y mostrar a los clientes
                    </label>
                </div>
                <div class="mb-4">
                    <label>Subir Fotografía del Menú</label>
                    <input type="file" name="imagen" class="form-control" accept="image/*">
                </div>
                
                <button type="submit" class="btn btn-elegant w-100">Guardar Menú</button>
                <a href="{{ url_for('menu_bp.listar_menus') }}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
