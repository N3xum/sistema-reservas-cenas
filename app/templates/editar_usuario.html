{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card card-elegant p-4">
            <h3 class="text-center mb-4">Editar Usuario</h3>
            <form method="POST">
                <div class="mb-3">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
                </div>
                <div class="mb-3">
                    <label>Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
                </div>
                <div class="mb-4">
                    <label>Rol</label>
                    <select name="rol" class="form-select">
                        <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                        <option value="administrador" {% if usuario.rol == 'administrador' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-elegant w-100">Guardar Cambios</button>
                <a href="{{ url_for('usuario_bp.listar_usuarios') }}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
