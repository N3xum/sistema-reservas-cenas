{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card card-elegant p-4">
            <h3 class="text-center mb-4">Editar Experiencia</h3>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label>Nombre del Menú</label>
                    <input type="text" name="nombre_experiencia" class="form-control" value="{{ menu.nombre_experiencia }}" required>
                </div>
                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="4">{{ menu.descripcion }}</textarea>
                </div>
                <div class="mb-3">
                    <label>Precio (Bs.)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" value="{{ menu.precio }}" required>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" name="disponibilidad" id="disponibilidad" {% if menu.disponibilidad %}checked{% endif %}>
                    <label class="form-check-label" for="disponibilidad">
                        Disponible para clientes
                    </label>
                </div>
                <div class="mb-4">
                    <label>Actualizar Fotografía (Opcional)</label>
                    <input type="file" name="imagen" class="form-control" accept="image/*">
                    {% if menu.imagen_referencial %}
                        <small class="text-muted d-block mt-1">Imagen actual: {{ menu.imagen_referencial }}</small>
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-elegant w-100">Actualizar Menú</button>
                <a href="{{ url_for('menu_bp.listar_menus') }}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
